<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //aperadores logicos 
        //esses operadoes sao usados para combinar expressoes logicas 

        //operador logico E (&&): retorna verdadeiro (true) se ambas as expressoes forem verdadeiras

        let nome = true
        let senha = true

        let resultado = nome && senha
        console.log(resultado)

        nome = 'Luis'
        senha = '1234'

        resultado = nome == "Luis" && senha == "1234"

        console.log(resultado)

        //operadoes logico ou (||): retorna verdadeiro (true) se ambas as expressoes forem verdadeiras

        nome = 'Luis'
        senha = '1234'

        resultado = nome == "Luis" || senha == "1234"

        console.log(resultado)
    </script>

</body>
</html>
