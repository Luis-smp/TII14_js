<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variaveis</title>
</head>
<body>
    <script>
        //var
        //variaveis declarada com var tem escopo global ou de funçao podem ser atualizadas e declaradas novamente dentro do seu escopo


        var nome = "Luis";
        console.log(nome);
        var nome = "Maria";
        console.log(nome);
        var nome = "Romel";
        console.log(nome);

        // let
        //variaveis declaradas com let tem escopo de bloco poder ser atualizadas, mas nao podem ser declaradas novamente

        let idade = 18;
        console.log(idade);
        
        idade = 12;
        console.log(idade);
    
        //const
        // constante o valor nao pode ser modificado
        const CIDADE = "São Paulo";
        console.log(CIDADE);

        
        //string
        let string = "sou texto";
        console.log(string);
        

        //boolean
        let maiorDeIdade = true;
        let menorDeIdade = false;

        console.log(maiorDeIdade);
        console.log(typeof maiorDeIdade);
        

        //number

        idade = 33;
        let preco = 25.90
        console.log(typeof preco);



        
        
    </script>
</body>
</html>
