<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operadoes</title>
</head>
<body>
    <script>
        let num1 = 20
        let num2 = 2

        let adicao = num1 + num2
        let subtracao = num1 - num2
        let multiplicacao = num1 * num2
        let divisao = num1 / num2
        let restoDivisaoInteira = num1 % num2

        console.log(adicao)
        console.log(subtracao)
        console.log(multiplicacao)
        console.log(divisao)
        console.log(restoDivisaoInteira)
        

    </script>
</body>
</html>
