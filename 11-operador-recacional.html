<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operacionais relacionados</title>
</head>
<body>
    <script>
        let num1 = 35
        let num2 = 5

        //igual a (==) verifica se dois valores sao iguais
        let igualdade = num1 == num2
        console.log(igualdade)

        console.log(5 == "5") // true (a string "5" e convertida para o numero 5)
        console.log(true == 1) // true (true e convertido para 1)
        console.log(false == 0) // true (false e convertido para 0)
        console.log(null == undefined) //true e(ambos sao considerado iguais em comparacao soltas )


        //igualdade a (===): verifica se dois valores sao iguais ou do mesmo tipo
        let igualdadeValorTipo = num1 === num2
        console.log (igualdadeValorTipo)

        console.log (5 ==='5')
        console.log (true ==='1')
        console.log (false ==='0')
        console.log (null ==='undefined')

        //diferente de (!=): verifica se dois valores sao diferentes

        console.log(true != 1);//false
        console.log(false != 0);//false
        console.log(null != undefined);//false

        console.log(5 != "5");//false
        console.log(true != 1);//false
        console.log(false != 0);//false
        console.log(null != undefined);//false
 
        //diferente de, verificando tipo e valor !==
        let diferenteTipo = num1 !== num2;//true
        console.log(igualdadeTipo);
 
        console.log(5 !== "5");//true
        console.log(true !== 1);//true
        console.log(false !== 0);//true
        console.log(null !== undefined);//true
 
        //Maior que >
        console.log(5 > 6);//false
        console.log(9 > 7);//true
        console.log(5 > 5);//false
        
        //Maior ou igual que >=
        console.log(5 >= 6);//false
        console.log(9 >= 7);//true
        console.log(5 >= 5);//true
       
        //Menor ou igual que <=
        console.log(5 <= 6);//true
        console.log(9 <= 7);//false
        console.log(5 <= 5);//false

    </script>
</body>
</html>
